<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#050d1e"/>

  <!-- Subtle centre glow -->
  <ellipse cx="600" cy="280" rx="500" ry="340" fill="url(#glow)"/>

  <!-- Logo mark — centred -->
  <rect x="536" y="170" width="128" height="128" rx="32" fill="#00d4ff"/>
  <!-- Arrow head -->
  <polygon points="600,196 632,244 568,244" fill="#050d1e"/>
  <!-- Arrow shaft -->
  <rect x="592" y="244" width="16" height="34" rx="4" fill="#050d1e"/>

  <!-- Wordmark -->
  <text
    x="600" y="360"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="72"
    fill="#e8f0fe"
    letter-spacing="-2"
    text-anchor="middle">Settling<tspan fill="#00d4ff">Up</tspan></text>

  <!-- Tagline -->
  <text
    x="600" y="418"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-weight="400"
    font-size="28"
    fill="#e8f0fe"
    opacity="0.45"
    letter-spacing="0.3"
    text-anchor="middle">Split expenses. Settle up fairly.</text>

  <!-- URL -->
  <text
    x="600" y="560"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="18"
    fill="#e8f0fe"
    opacity="0.18"
    letter-spacing="1"
    text-anchor="middle">settlingup.com</text>
</svg>
